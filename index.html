<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lumière Retail – Teams Test Tenant Explorer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg:#f7f8fb; --panel:#ffffff; --ink:#1a1f2e; --muted:#64748b; --accent:#4f46e5;
    --line:#e2e8f0; --line2:#cbd5e1; --chip:#eef2ff; --chip-ink:#3730a3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.45}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{background:#0f172a;color:#e2e8f0;padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sidebar h1{font-size:14px;margin:0 0 14px;color:#fff;letter-spacing:.4px}
  .sidebar .sub{font-size:11px;color:#94a3b8;margin-bottom:14px;line-height:1.4}
  .nav a{display:block;color:#cbd5e1;padding:8px 10px;border-radius:6px;margin-bottom:2px;font-size:13px}
  .nav a:hover{background:#1e293b;text-decoration:none}
  .nav a.active{background:#4f46e5;color:#fff}
  .nav .nav-section{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#64748b;padding:14px 10px 6px;border-top:1px solid #1e293b;margin-top:8px}
  .nav .nav-section.first{border-top:none;margin-top:0;padding-top:6px}
  .main{padding:24px 28px;max-width:1400px;width:100%}
  h2.page-title{margin:0 0 6px;font-size:22px}
  .page-sub{color:var(--muted);margin:0 0 18px;font-size:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
  .card h3{margin:0 0 10px;font-size:15px}
  .grid{display:grid;gap:12px}
  .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;background:var(--chip);color:var(--chip-ink);white-space:nowrap;border:1px solid #c7d2fe}
  .pill.series{color:#fff;border:none}
  .pill.muted{background:#f1f5f9;color:#475569;border-color:#e2e8f0}
  .pill.ghost{background:#fff;color:#475569;border:1px solid var(--line)}
  .tag{display:inline-block;font-size:11px;color:var(--muted);background:#f1f5f9;border-radius:4px;padding:2px 6px;border:1px solid var(--line)}

  /* ---- Persona list ---- */
  .persona-row{display:flex;gap:14px;padding:12px;border-bottom:1px solid var(--line)}
  .persona-row:last-child{border-bottom:none}
  .persona-row:hover{background:#fafbff;cursor:pointer}
  .avatar{width:64px;height:64px;border-radius:50%;background:#e2e8f0;flex:0 0 64px;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .avatar.lg{width:120px;height:120px;flex-basis:120px}
  .persona-row .pmeta{flex:1;min-width:0}
  .persona-row .pmeta .pname{font-weight:600;font-size:14px;margin-bottom:2px}
  .persona-row .pmeta .ptitle{color:var(--ink);font-size:13px}
  .persona-row .pmeta .pregion{color:var(--muted);font-size:12px}
  .persona-row .pmeta .presp{color:#334155;font-size:12px;margin-top:6px;line-height:1.4}

  /* ---- Calendar / Gantt ---- */
  .calendar{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;font-size:11px}
  .calendar th, .calendar td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:4px;vertical-align:top}
  .calendar th{background:#f8fafc;font-weight:600;text-align:center;color:#475569}
  .calendar th.weeklabel{background:#eef2ff;color:#3730a3}
  .calendar .seriesname{position:sticky;left:0;background:#f8fafc;text-align:left;font-weight:600;font-size:12px;width:160px;z-index:2;border-right:2px solid var(--line2)}
  .calendar td.daycell{min-width:110px;max-width:140px;height:56px}
  .cal-card{display:block;padding:4px 6px;border-radius:5px;color:#fff;font-weight:600;font-size:10.5px;line-height:1.2;margin-bottom:3px;cursor:pointer;text-decoration:none}
  .cal-card:hover{outline:2px solid #1e293b;text-decoration:none}
  .cal-card .t{font-weight:400;opacity:.85;font-size:9.5px;display:block}

  /* ---- List view ---- */
  .meeting-row{display:flex;gap:12px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .meeting-row:last-child{border-bottom:none}
  .meeting-row:hover{background:#fafbff}
  .mr-color{width:6px;align-self:stretch;border-radius:3px;flex:0 0 6px}
  .mr-main{flex:1;min-width:0}
  .mr-title{font-weight:600;font-size:13px}
  .mr-meta{color:var(--muted);font-size:12px;margin-top:2px}
  .mr-right{text-align:right;font-size:11px;color:var(--muted)}

  /* ---- Matrix tables ---- */
  table.matrix{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;font-size:12px}
  table.matrix th, table.matrix td{border:1px solid var(--line);padding:6px 8px;text-align:center}
  table.matrix th{background:#f8fafc;font-weight:600;color:#334155;position:sticky;top:0;z-index:1}
  table.matrix td.label{text-align:left;font-weight:600;background:#fafbff;position:sticky;left:0;z-index:1}
  table.matrix td.has{background:#dcfce7;color:#166534;font-weight:600}
  table.matrix td.heat-0{background:#ffffff}
  table.matrix td.heat-1{background:#dbeafe}
  table.matrix td.heat-2{background:#93c5fd}
  table.matrix td.heat-3{background:#3b82f6;color:#fff}
  table.matrix td.heat-4{background:#1d4ed8;color:#fff}
  table.matrix td.heat-5{background:#1e3a8a;color:#fff}

  /* ---- Tabs ---- */
  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
  .tabs button{background:none;border:none;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500}
  .tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .tabs button:hover{color:var(--ink)}

  /* ---- Search bar ---- */
  .searchbar{display:flex;gap:8px;margin-bottom:12px}
  .searchbar input, .searchbar select{padding:7px 10px;border:1px solid var(--line2);border-radius:6px;font-size:13px;background:#fff;color:var(--ink)}
  .searchbar input{flex:1;min-width:200px}

  /* ---- Detail page ---- */
  .detail-hero{display:flex;gap:18px;align-items:center;margin-bottom:14px}
  .detail-hero h2{margin:0;font-size:22px}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:6px 14px;font-size:13px}
  .kv dt{color:var(--muted);font-weight:500}
  .kv dd{margin:0}
  .breadcrumb{font-size:12px;color:var(--muted);margin-bottom:10px}
  .breadcrumb a{color:var(--muted)}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted);margin-bottom:10px}
  .legend .lg-item{display:inline-flex;align-items:center;gap:5px}
  .legend .lg-sw{width:14px;height:14px;border-radius:3px;display:inline-block}

  /* ---- Empty state (rarely used) ---- */
  .empty{padding:18px;color:var(--muted);font-style:italic;text-align:center}

  /* ---- v4: 7-icon produce row ---- */
  .produce-row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:8px}
  .produce-cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border:1px solid var(--line);border-radius:8px;background:#f8fafc;color:var(--muted);text-decoration:none;text-align:center;font-size:11px;transition:background .15s,border-color .15s}
  .produce-cell .icon{font-size:22px;line-height:1;filter:grayscale(1) opacity(.4)}
  .produce-cell .lbl{line-height:1.2}
  .produce-cell.on{background:#fef3c7;border-color:#fcd34d;color:#92400e;font-weight:600}
  .produce-cell.on .icon{filter:none}
  .produce-cell:hover{border-color:var(--accent)}

  /* ---- v4: meeting-row mini icon bar ---- */
  .mr-icons{display:flex;gap:4px;justify-content:flex-end}
  .mr-icon{font-size:14px;opacity:.25;filter:grayscale(1)}
  .mr-icon.on{opacity:1;filter:none}

  /* ---- v4: speaker rows on meeting detail ---- */
  .speakers{display:flex;flex-direction:column;gap:10px}
  .speaker-row{display:flex;gap:12px;align-items:flex-start;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fafbff}
  .speaker-body{flex:1}
  .speaker-head{margin-bottom:4px}
  .speaker-name{font-weight:600;color:var(--ink);text-decoration:none}
  .speaker-title{color:var(--muted);font-size:12px;margin-left:6px}
  .speaker-note{font-size:13px;color:#1f2937;line-height:1.45}

  /* ---- v4: agenda / chat bullets ---- */
  ul.bullets{margin:6px 0 2px 0;padding-left:22px}
  ul.bullets li{margin:5px 0;line-height:1.45;color:#1f2937}
  ul.bullets.chat li{color:#334155;font-style:italic}

  /* ---- v4: references list ---- */
  .ref-line{padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .ref-line:last-child{border-bottom:none}
  .ref-link{font-weight:600;color:var(--accent);text-decoration:none}
  .ref-link:hover{text-decoration:underline}
  .ref-note{color:var(--muted)}

  /* ---- v4: artifact card with icon ---- */
  .artifact-card{transition:border-color .15s,box-shadow .15s}
  .artifact-card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(59,130,246,.10)}
  .artifact-head{display:flex;align-items:center;gap:14px}
  .artifact-icon{font-size:36px;line-height:1}
  .artifact-name{font-weight:700;font-size:16px;color:var(--ink)}
  .artifact-id{font-size:11px;color:var(--muted);letter-spacing:.05em}

  /* ---- v4: test case card ---- */
  .testcase-card{border-left:4px solid #6366f1;background:linear-gradient(180deg,#eef2ff 0%,#ffffff 30%)}
  .tc-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid #c7d2fe;background:#fff;color:#4338ca;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;transition:background .15s,border-color .15s;cursor:pointer;font-family:inherit}
  .tc-btn:hover{background:#eef2ff;border-color:#6366f1}
  .tc-btn.primary{background:#6366f1;color:#fff;border-color:#6366f1}
  .tc-btn.primary:hover{background:#4f46e5;border-color:#4f46e5}

  /* ---- v4: meeting-row tag for "has test case" ---- */
  .mr-tc-tag{display:inline-block;margin-top:4px;padding:1px 7px;font-size:10px;font-weight:700;letter-spacing:.04em;background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;border-radius:4px}

  @media (max-width: 900px){
    .app{grid-template-columns:1fr}
    .sidebar{position:relative;height:auto}
    .grid.cols-3,.grid.cols-2{grid-template-columns:1fr}
    .produce-row{grid-template-columns:repeat(4,1fr)}
  }
</style>
</head>

// Self-contained test-case download/view helpers (work even when the HTML is hosted on

function downloadTestcase(mid){
  const json = TESTCASE_FILES[mid];
  if (!json){ alert('No test case available for ' + mid); return; }
  const blob = new Blob([json], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = mid + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---------- Indexes ----------
const byId = (arr, k='id') => Object.fromEntries(arr.map(x => [x[k], x]));
const personasById = byId(DATA.personas);
const seriesById   = byId(DATA.series);
const interactionsById = byId(DATA.interactions);
const artifactsById = byId(DATA.artifacts);
const scenariosById = byId(DATA.scenarios);
const meetingsById  = byId(DATA.meetings);

// helpful derived: list of meeting ids per series, per persona attendance, etc.
const meetingsBySeries = {};
DATA.series.forEach(s => meetingsBySeries[s.id] = []);
DATA.meetings.forEach(m => { meetingsBySeries[m.series].push(m.id); });

const meetingsByPersona = {};
DATA.personas.forEach(p => meetingsByPersona[p.id] = []);
DATA.meetings.forEach(m => {
  const set = new Set(m.attendees.concat([m.organizer]));
  set.forEach(pid => { if (meetingsByPersona[pid]) meetingsByPersona[pid].push(m.id); });
});

// ---------- Utilities ----------
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function link(href, text, cls=''){ return el('a', {href, class:cls}, text); }

function pillSeries(seriesId){
  const s = seriesById[seriesId];
  if (!s) return el('span');
  return el('a', {class:'pill series', href:'#/series/'+s.id, style:'background:'+s.color},
    [s.id+' · '+s.name]);
}

function pillInteraction(iid){
  const i = interactionsById[iid];
  if (!i) return el('span');
  return el('a', {class:'pill', href:'#/interactions/'+i.id, title:i.summary}, [i.display_name]);
}

function pillArtifact(aid){
  const a = artifactsById[aid];
  if (!a) return el('span');
  const icon = a.icon ? (a.icon+' ') : '';
  return el('a', {class:'pill', href:'#/artifacts/'+a.id, style:'background:#fef3c7;color:#92400e;border-color:#fde68a', title:a.summary}, [icon + a.display_name]);
}

// Render a fixed 7-icon row showing which artifacts a meeting produces.
// Highlighted when produced, dimmed when not. Each icon is a clickable link.
function produceIcons(produces){
  const set = new Set(produces || []);
  const order = (DATA.artifact_order && DATA.artifact_order.length) ? DATA.artifact_order :
                ['TRN','REC','CHT','LN','AIT','DOC','RECAP'];
  const wrap = el('div', {class:'produce-row'});
  order.forEach(aid => {
    const a = artifactsById[aid];
    if (!a) return;
    const on = set.has(aid);
    const cls = 'produce-cell' + (on ? ' on' : '');
    const cell = el('a', {class:cls, href:'#/artifacts/'+aid, title:(on?'Produced: ':'Not produced: ')+a.display_name},
      [ el('span', {class:'icon'}, [a.icon||'•']),
        el('span', {class:'lbl'}, [a.display_name]) ]);
    wrap.appendChild(cell);
  });
  return wrap;
}

function pillPersona(pid){
  const p = personasById[pid];
  if (!p) return el('span', {}, [pid]);
  return el('a', {class:'pill ghost', href:'#/personas/'+p.id}, [p.name]);
}

function pillScenario(sid){
  const s = scenariosById[sid];
  if (!s) return el('span');
  return el('a', {class:'pill muted', href:'#/scenarios/'+s.id}, [s.id+' · '+s.name]);
}

function avatarImg(personaId, size=64){
  const url = 'https://api.dicebear.com/9.x/personas/svg?seed='+encodeURIComponent(personaId);
  return el('img', {class: size>=120 ? 'avatar lg' : 'avatar', src:url, alt:personaId, loading:'lazy'});
}

function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

// ---------- Router ----------
function setActiveNav(hash){
  const links = document.querySelectorAll('#nav a');
  links.forEach(a => {
    const h = a.getAttribute('href');
    a.classList.toggle('active', hash.startsWith(h));
  });
}

function route(){
  const hash = location.hash || '#/overview';
  setActiveNav(hash);
  const main = document.getElementById('main');
  clear(main);
  const parts = hash.replace(/^#\//,'').split('/');
  const page = parts[0];
  const id = parts[1];
  switch(page){
    case 'overview':       renderOverview(main); break;
    case 'scenarios':      id ? renderScenarioDetail(main,id) : renderScenarios(main); break;
    case 'personas':       id ? renderPersonaDetail(main,id)  : renderPersonas(main); break;
    case 'series':         id ? renderSeriesDetail(main,id)   : renderSeries(main); break;
    case 'meetings':       id ? renderMeetingDetail(main,id)  : renderMeetings(main); break;
    case 'interactions':   id ? renderInteractionDetail(main,id): renderInteractions(main); break;
    case 'artifacts':      id ? renderArtifactDetail(main,id) : renderArtifactsPage(main); break;
    case 'workflow':       renderTargetedWorkflow(main); break;
    case 'config':         renderConfigPage(main, id || 'users'); break;
    default:               renderOverview(main);
  }
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', route);

// ---------- Overview ----------
function renderOverview(main){
  main.appendChild(el('h2', {class:'page-title'}, ['Lumière Retail Group – Teams Test Tenant']));
  main.appendChild(el('p', {class:'page-sub'}, ['A multi-national retail company running daily Teams meetings for sales updates, issue triage, cross-regional syncs and CVP reviews. Use this explorer to navigate personas, meetings, interaction patterns, artifacts, and how they all connect.']));

  const stats = el('div', {class:'grid cols-3'});
  [
    ['Personas', DATA.personas.length, '#/personas'],
    ['Meeting Series', DATA.series.length, '#/series'],
    ['Meetings (5 wks)', DATA.meetings.length, '#/meetings'],
    ['Hero Scenarios', DATA.scenarios.length, '#/scenarios'],
    ['Interaction Patterns', DATA.interactions.length, '#/interactions'],
    ['Artifact Packs', DATA.artifacts.length, '#/artifacts'],
  ].forEach(([label,val,href]) => {
    const c = el('a', {class:'card', href, style:'display:block;text-align:center;text-decoration:none;color:inherit'},
      [el('div', {style:'font-size:28px;font-weight:700;color:#4f46e5'}, [String(val)]),
       el('div', {style:'color:#64748b;margin-top:4px'}, [label])]);
    stats.appendChild(c);
  });
  main.appendChild(stats);

  main.appendChild(el('div', {class:'card'}, [
    el('h3', {}, ['How to use this explorer']),
    el('ul', {style:'margin:6px 0 0 18px;padding:0;color:#334155'}, [
      el('li', {}, ['Each pill or card is clickable — follow the threads between people, meetings, and artifacts.']),
      el('li', {}, ['Meetings are color-coded by series; the calendar view shows the full 5-week schedule at a glance.']),
      el('li', {}, ['The Relationships page exposes the connections as matrices (people × series, series × week, interaction × artifact, etc.).']),
    ])
  ]));

  // legend
  const legend = el('div', {class:'card'}, [
    el('h3', {}, ['Series color legend']),
    el('div', {class:'legend'},
      DATA.series.map(s => el('span', {class:'lg-item'}, [
        el('span', {class:'lg-sw', style:'background:'+s.color}),
        s.id+' · '+s.name+' ('+s.region+')'
      ]))
    )
  ]);
  main.appendChild(legend);
}

  main.appendChild(el('h2', {class:'page-title'}, ['Hero Scenarios']));
  main.appendChild(el('p', {class:'page-sub'}, ['Four scenarios drive the meeting cadence and the interaction patterns required of the tenant.']));
  const grid = el('div', {class:'grid cols-2'});
  DATA.scenarios.forEach(s => {
    const card = el('a', {class:'card', href:'#/scenarios/'+s.id, style:'display:block;text-decoration:none;color:inherit'}, [
      el('h3', {}, [s.id+' · '+s.name]),
      el('p', {style:'color:#334155;margin:4px 0 0'}, [s.summary]),
    ]);
    grid.appendChild(card);
  });
  main.appendChild(grid);
}

function renderScenarioDetail(main, id){
  const s = scenariosById[id]; if (!s) return renderScenarios(main);
  main.appendChild(el('div', {class:'breadcrumb'}, [link('#/scenarios','Scenarios'),' › ',s.id]));
  main.appendChild(el('h2', {class:'page-title'}, [s.id+' · '+s.name]));
  main.appendChild(el('p', {class:'page-sub'}, [s.summary]));
  const ms = DATA.meetings.filter(m => m.scenario === id);
  main.appendChild(el('div', {class:'card'}, [
    el('h3', {}, ['Meetings in this scenario ('+ms.length+')']),
    renderMeetingList(ms)
  ]));
}

// ---------- Personas ----------
function renderPersonas(main){
  main.appendChild(el('h2', {class:'page-title'}, ['Personas']));
  main.appendChild(el('p', {class:'page-sub'}, ['18 personas across 3 regions plus the global HQ. Click a person to see who they report to, their meetings, and the artifacts they touch.']));

  const search = el('input', {placeholder:'Search by name, title, region…', oninput: (e) => filterPersonas(e.target.value)});
  const bar = el('div', {class:'searchbar'}, [search]);
  main.appendChild(bar);

  const list = el('div', {class:'card', id:'persona-list', style:'padding:0'});
  main.appendChild(list);

  function filterPersonas(q){
    const ql = (q||'').toLowerCase().trim();
    clear(list);
    DATA.personas.filter(p =>
      !ql || p.name.toLowerCase().includes(ql) || p.title.toLowerCase().includes(ql) || p.region.toLowerCase().includes(ql)
    ).forEach(p => {
      const langs = (p.languages && p.languages.length) ? p.languages.join(' / ') : 'English';
      const row = el('a', {class:'persona-row', href:'#/personas/'+p.id, style:'text-decoration:none;color:inherit;display:flex'}, [
        avatarImg(p.id, 64),
        el('div', {class:'pmeta'}, [
          el('div', {class:'pname'}, [p.name+' '+ (p.reports_to ? '' : '★') ]),
          el('div', {class:'ptitle'}, [p.title]),
          el('div', {class:'pregion'}, [p.region+ (p.reports_to ? ' · reports to '+personasById[p.reports_to].name : ' · top of org')]),
          el('div', {class:'pregion'}, ['Languages: '+langs]),
          el('div', {class:'presp'}, [p.responsibilities]),
        ])
      ]);
      list.appendChild(row);
    });
  }
  filterPersonas('');
}

function renderPersonaDetail(main, id){
  const p = personasById[id]; if (!p) return renderPersonas(main);
  main.appendChild(el('div', {class:'breadcrumb'}, [link('#/personas','Personas'),' › ',p.name]));

  const hero = el('div', {class:'detail-hero'}, [
    avatarImg(p.id, 120),
    el('div', {}, [
      el('h2', {}, [p.name]),
      el('div', {style:'color:#475569;font-size:14px;margin-top:2px'}, [p.title]),
      el('div', {style:'color:#64748b;font-size:13px;margin-top:2px'}, [p.region])
    ])
  ]);
  main.appendChild(hero);

  // KV
  const langs = (p.languages && p.languages.length) ? p.languages.join(', ') : 'English';
  const kv = el('dl', {class:'kv'}, [
    el('dt', {}, ['ID']), el('dd', {}, [p.id]),
    el('dt', {}, ['Languages spoken']), el('dd', {}, [langs]),
    el('dt', {}, ['Reports to']), el('dd', {}, [p.reports_to ? pillPersona(p.reports_to) : el('span',{class:'tag'},['— top of org —'])]),
    el('dt', {}, ['Direct reports']), el('dd', {}, [(() => {
      const reps = DATA.personas.filter(x => x.reports_to === p.id);
      if (!reps.length) return el('span', {class:'tag'}, ['none']);
      const w = el('span', {class:'row'}); reps.forEach(r => w.appendChild(pillPersona(r.id))); return w;

    el('dt', {}, ['Responsibilities']), el('dd', {}, [p.responsibilities]),

  main.appendChild(el('div', {class:'card'}, [kv]));

  // Meetings attended
  const mids = meetingsByPersona[p.id] || [];

    el('h3', {}, ['Meetings ('+ms.length+')']),

// ---------- Meetings: List + Calendar ----------
function renderMeetings(main){
  main.appendChild(el('h2', {class:'page-title'}, ['Meetings']));
  main.appendChild(el('p', {class:'page-sub'}, ['42 meetings across 5 weeks. Toggle Calendar to see the rhythm; List to filter and read details.']));

  // E2E Legend
  const legend = el('div', {style:'display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;font-size:12px;color:#475569'});
  legend.appendChild(el('div', {style:'display:flex;align-items:center;gap:5px'}, [
    el('div', {style:'width:14px;height:14px;border-radius:3px;background:#fbbf24;border:1px solid #d97706'}),
    el('span', {}, ['⭐ E2E Meeting (cross-meeting synthesis + AI outputs)']),
  ]));
  legend.appendChild(el('div', {style:'display:flex;align-items:center;gap:5px'}, [
    el('span', {style:'font-size:14px'}, ['🌐']),
    el('span', {}, ['AI Interpreter enabled']),
  ]));
  main.appendChild(legend);

  const tabs = el('div', {class:'tabs'});
  const btnCal  = el('button', {class:'active', onclick:() => switchTab('cal')}, ['Calendar (5-week Gantt)']);
  const btnList = el('button', {onclick:() => switchTab('list')}, ['List view']);
  tabs.append(btnCal, btnList);
  main.appendChild(tabs);

  const container = el('div', {id:'meetings-pane'});
  main.appendChild(container);

  function switchTab(t){
    btnCal.classList.toggle('active', t==='cal');
    btnList.classList.toggle('active', t==='list');
    clear(container);
    if (t==='cal') container.appendChild(renderCalendar());
    else container.appendChild(renderMeetingsListPane());
  }
  switchTab('cal');
}

function renderCalendar(){
  // Build table: rows = series, cols = 5 weeks × 5 weekdays.
  const wrap = el('div', {class:'card', style:'padding:8px;overflow-x:auto'});
  const tbl = el('table', {class:'calendar'});

  // Header row 1: week labels
  const thead = el('thead');
  const tr1 = el('tr');
  tr1.appendChild(el('th', {class:'seriesname', rowspan:'2'}, ['Series ↓ / Day →']));
  DATA.week_mondays.forEach((iso,i) => {
    tr1.appendChild(el('th', {class:'weeklabel', colspan:'5'}, ['Week '+(i+1)+' (of '+iso.slice(5)+')']));
  });
  thead.appendChild(tr1);
  const tr2 = el('tr');
  for (let w=0; w<5; w++){
    DATA.weekday_labels.forEach(lbl => tr2.appendChild(el('th', {}, [lbl])));
  }
  thead.appendChild(tr2);
  tbl.appendChild(thead);

  // Body
  const tbody = el('tbody');
  DATA.series.forEach(s => {
    const tr = el('tr');
    tr.appendChild(el('td', {class:'seriesname', style:'border-left:6px solid '+s.color}, [s.id+' · '+s.name]));
    for (let w=0; w<5; w++){
      for (let d=0; d<5; d++){
        const td = el('td', {class:'daycell'});
        const cellMeetings = DATA.meetings.filter(m => m.series === s.id && m.week_idx === w && m.weekday_idx === d);
        cellMeetings.forEach(m => {
          const isE2E = m.is_e2e === true;
          const calStyle = isE2E
            ? 'background:#fbbf24;border:2px solid #d97706;font-weight:700'
            : 'background:'+s.color;
          const calTitle = (isE2E ? '⭐ E2E: ' : '') + m.title + ' · ' + m.time;
          td.appendChild(el('a', {class:'cal-card', href:'#/meetings/'+m.id, style:calStyle, title:calTitle}, [
            m.id + (isE2E ? ' ⭐' : ''),
            el('span', {class:'t'}, [m.time])
          ]));
        });
        tr.appendChild(td);
      }
    }
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);

  // Footnote about ad-hoc rows etc.
  wrap.appendChild(el('div', {style:'color:#64748b;font-size:11px;margin-top:8px'}, ['Tip: hover any tile to see its title and start time. Click to open the meeting detail.']));
  return wrap;
}

function renderMeetingsListPane(){
  const wrap = el('div', {});
  const bar = el('div', {class:'searchbar'});
  const search = el('input', {placeholder:'Search title, organizer, purpose…', oninput:(e)=>refresh()});
  const seriesSel = el('select', {onchange:refresh}, [el('option',{value:''},['All series'])].concat(
    DATA.series.map(s => el('option', {value:s.id}, [s.id+' · '+s.name]))
  ));
  const intSel = el('select', {onchange:refresh}, [el('option',{value:''},['All interaction patterns'])].concat(
    DATA.interactions.map(i => el('option', {value:i.id}, [i.display_name]))
  ));
  bar.append(search, seriesSel, intSel);
  wrap.appendChild(bar);

  const card = el('div', {class:'card', style:'padding:0'});
  wrap.appendChild(card);

  function refresh(){
    const q = (search.value||'').toLowerCase();
    const sf = seriesSel.value, ifl = intSel.value;
    const filtered = DATA.meetings.filter(m => {
      if (sf && m.series !== sf) return false;
      if (ifl && m.interaction !== ifl) return false;
      if (!q) return true;
      return (m.title+' '+m.purpose+' '+(personasById[m.organizer]?.name||'')).toLowerCase().includes(q);
    });
    clear(card);
    if (filtered.length === 0){
      card.appendChild(el('div', {class:'empty'}, ['No meetings match these filters.']));
    } else {
      card.appendChild(renderMeetingList(filtered));
    }
  }
  refresh();
  return wrap;
}

function renderMeetingList(meetings){
  const wrap = el('div', {});
  meetings.forEach(m => {
    const s = seriesById[m.series];
    const i = interactionsById[m.interaction];
    const dur = m.duration_min ? (m.duration_min+' min') : '';
    const langs = (m.languages && m.languages.length) ? m.languages.join(' / ') : 'English';
    const orgName = personasById[m.organizer]?.name || m.organizer;
    const attendNames = (m.attendees||[]).slice(0,6).map(a => personasById[a]?.name || a).join(', ')
                       + ((m.attendees||[]).length>6 ? ' +'+((m.attendees||[]).length-6)+' more' : '');
    // produce icons mini-row
    const set = new Set(m.produces || []);
    const order = (DATA.artifact_order && DATA.artifact_order.length) ? DATA.artifact_order :
                  ['TRN','REC','CHT','LN','AIT','DOC','RECAP'];
    const iconsBar = el('div', {class:'mr-icons'});
    order.forEach(aid => {
      const a = artifactsById[aid]; if(!a) return;
      iconsBar.appendChild(el('span', {class:'mr-icon'+(set.has(aid)?' on':''), title:(set.has(aid)?'Produces ':'No ')+a.display_name}, [a.icon||'•']));
    });
    // E2E highlight styling
    const isE2E = m.is_e2e === true;
    const rowStyle = isE2E
      ? 'text-decoration:none;color:inherit;background:linear-gradient(90deg,#fffbeb 0%,#fef3c7 100%);border-left:4px solid #f59e0b'
      : 'text-decoration:none;color:inherit';
    const row = el('a', {class:'meeting-row', href:'#/meetings/'+m.id, style:rowStyle}, [
      el('div', {class:'mr-color', style:'background:'+(s?s.color:'#94a3b8')}),
      el('div', {class:'mr-main'}, [
        el('div', {class:'mr-title'}, [
          m.id+' · '+m.title,
          (isE2E ? el('span', {style:'background:#fbbf24;color:#78350f;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:8px'}, ['⭐ E2E']) : ''),
          (m.ai_interpreter ? el('span', {style:'background:#dbeafe;color:#1e40af;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;margin-left:6px'}, ['🌐 '+m.ai_interpreter]) : ''),
          (m.testcase_url && !isE2E ? el('span',{class:'mr-tc-tag', title:'Has synthetic test case JSON'},[' TEST CASE ']) : ''),
        ]),
        el('div', {class:'mr-meta'}, [m.date+' · '+m.time+(dur?' · '+dur:'')+' · '+(s?s.name:m.series)]),
        el('div', {class:'mr-meta'}, ['Organizer: '+orgName+' · Attendees: '+attendNames]),
        el('div', {class:'mr-meta'}, ['Language: '+langs+(i?(' · '+i.display_name):'')]),
      ]),
      el('div', {class:'mr-right'}, [iconsBar])
    ]);
    wrap.appendChild(row);
  });
  return wrap;
}

function renderMeetingDetail(main, id){
  const m = meetingsById[id]; if (!m) return renderMeetings(main);
  const s = seriesById[m.series];
  main.appendChild(el('div', {class:'breadcrumb'}, [link('#/meetings','Meetings'),' › ',m.id]));
  main.appendChild(el('h2', {class:'page-title', style:'border-left:6px solid '+(s?s.color:'#94a3b8')+';padding-left:10px'}, [m.id+' · '+m.title]));
  // E2E and AI Interpreter badges on detail page
  if (m.is_e2e || m.ai_interpreter) {
    const badges = el('div', {style:'display:flex;gap:8px;margin-bottom:8px'});
    if (m.is_e2e) badges.appendChild(el('span', {style:'background:#fbbf24;color:#78350f;font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px'}, ['⭐ E2E Meeting — Cross-meeting synthesis']));
    if (m.ai_interpreter) badges.appendChild(el('span', {style:'background:#dbeafe;color:#1e40af;font-size:12px;font-weight:600;padding:3px 10px;border-radius:4px'}, ['🌐 AI Interpreter: '+m.ai_interpreter]));
    main.appendChild(badges);
  }
  main.appendChild(el('p', {class:'page-sub'}, [m.purpose]));

  // ---------- Key facts ----------
  const dur = m.duration_min ? (m.duration_min+' minutes') : '—';
  const langs = (m.languages && m.languages.length) ? m.languages.join(', ') : 'English';
  const kv = el('dl', {class:'kv'});
  const kvRows = [
    ['When', el('span',{},[m.date+' · '+m.time])],
    ['Duration', el('span',{},[dur])],
    ['Languages', el('span',{},[langs])],
    ['Series', pillSeries(m.series)],
    ['Scenario', pillScenario(m.scenario)],
    ['Organizer', pillPersona(m.organizer)],
    ['Attendees ('+m.attendees.length+')', (() => { const w = el('span',{class:'row'}); m.attendees.forEach(a => w.appendChild(pillPersona(a))); return w; })()],
    ['Interaction pattern', pillInteraction(m.interaction)],
  ];
  kvRows.forEach(([k,v]) => { kv.appendChild(el('dt',{},[k])); kv.appendChild(el('dd',{},[v])); });
  main.appendChild(el('div', {class:'card'}, [kv]));

  // ---------- Test case JSON (only for meetings with a defined testcase file) ----------
  if (m.testcase_url){
    main.appendChild(el('div', {class:'card testcase-card'}, [
      el('h3', {}, ['🧪 Synthetic test case (JSON)']),
      el('p', {style:'margin:4px 0;color:#475569'}, ['This meeting has a machine-runnable test case that scripts every action — joins, Facilitator enablement, spoken lines, chat messages, screenshare, and exits — in the exact order they happen.']),
      el('div', {class:'row', style:'gap:10px;margin-top:8px;align-items:center;flex-wrap:wrap'}, [
        el('button', {class:'tc-btn',         onclick:(function(tid){return function(){viewTestcase(tid);};})(m.testcase_id || m.id)},     ['📄 View JSON']),
        el('button', {class:'tc-btn primary', onclick:(function(tid){return function(){downloadTestcase(tid);};})(m.testcase_id || m.id)}, ['⬇ Download '+(m.testcase_id || m.id)+'.json']),
        el('span', {style:'color:#64748b;font-size:12px'}, ['Embedded — works offline and on SharePoint'])
      ])
    ]));
  }

  // ---------- Artifacts produced (7-cell icon row) ----------
  main.appendChild(el('div', {class:'card'}, [
    el('h3', {}, ['Artifacts produced']),
    el('p', {style:'margin:4px 0;color:#64748b'}, ['Highlighted icons are the artifact categories produced by this meeting. Click any icon to see all meetings that produce it.']),
    produceIcons(m.produces||[])
  ]));

  // ---------- Agenda ----------
  if (m.agenda_topics && m.agenda_topics.length){
    const list = el('ul', {class:'bullets'});
    m.agenda_topics.forEach(t => list.appendChild(el('li', {}, [t])));
    main.appendChild(el('div', {class:'card'}, [el('h3',{},['Agenda']), list]));
  }

  // ---------- Speakers + what they said ----------
  if (m.speakers && m.speakers.length){
    const sp = el('div', {class:'speakers'});
    m.speakers.forEach(row => {
      const pid = row[0]; const note = row[1] || '';
      const p = personasById[pid];
      const pname = p ? p.name : pid;
      const ptitle = p ? p.title : '';
      sp.appendChild(el('div', {class:'speaker-row'}, [
        avatarImg(pid, 48),
        el('div', {class:'speaker-body'}, [
          el('div', {class:'speaker-head'}, [link('#/personas/'+pid, pname, 'speaker-name'), ' ', el('span',{class:'speaker-title'},[ptitle])]),
          el('div', {class:'speaker-note'}, [note])
        ])
      ]));
    });
    main.appendChild(el('div', {class:'card'}, [el('h3',{},['Speakers & key contributions']), sp]));
  }

  // ---------- Chat highlights ----------
  if (m.chat_highlights && m.chat_highlights.length){
    const list = el('ul', {class:'bullets chat'});
    m.chat_highlights.forEach(c => list.appendChild(el('li', {}, [c])));
    main.appendChild(el('div', {class:'card'}, [el('h3',{},['Chat highlights']), list]));
  }

  // ---------- Interaction summary ----------
  const i = interactionsById[m.interaction];
  if (i){
    main.appendChild(el('div', {class:'card'}, [
      el('h3', {}, ['What enables these artifacts: '+i.display_name]),
      el('p', {style:'margin:4px 0'}, [i.summary])
    ]));
  }

  // ---------- References & referenced_by ----------
  const refs = m.references || [], refby = m.referenced_by || [];
  if (refs.length || refby.length){
    const refsList = el('div');
    if (refs.length){
      refs.forEach(r => {
        const tgt = meetingsById[r[0]];
        refsList.appendChild(el('div', {class:'ref-line'}, [
          link('#/meetings/'+r[0], (tgt?tgt.id+' · '+tgt.title:r[0]), 'ref-link'),
          el('span', {class:'ref-note'}, [' — '+(r[1]||'')])
        ]));
      });
    } else {
      refsList.appendChild(el('div', {class:'empty', style:'padding:8px'}, ['— this meeting starts a thread —']));
    }
    const refbyList = el('div');
    if (refby.length){
      refby.forEach(r => {
        const tgt = meetingsById[r[0]];
        refbyList.appendChild(el('div', {class:'ref-line'}, [
          link('#/meetings/'+r[0], (tgt?tgt.id+' · '+tgt.title:r[0]), 'ref-link'),
          el('span', {class:'ref-note'}, [' — '+(r[1]||'')])
        ]));
      });
    } else {
      refbyList.appendChild(el('div', {class:'empty', style:'padding:8px'}, ['— not yet referenced by later meetings —']));
    }
    main.appendChild(el('div', {class:'card'}, [
      el('h3', {}, ['Cross-meeting references']),
      el('p', {style:'margin:4px 0;color:#64748b'}, ['Recap content and Facilitator-generated docs in this meeting pull from earlier meetings (left); later meetings reference this one (right).']),
      el('div', {style:'display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px'}, [
        el('div', {}, [el('div', {style:'font-weight:600;margin-bottom:6px;color:#334155'}, ['References earlier meetings ('+refs.length+')']), refsList]),
        el('div', {}, [el('div', {style:'font-weight:600;margin-bottom:6px;color:#334155'}, ['Referenced by later meetings ('+refby.length+')']), refbyList]),
      ])
    ]));
  }

  // ---------- builds_on / feeds_into ----------
  const bo = m.builds_on || [], fi = m.feeds_into || [];
  if (bo.length || fi.length){
    main.appendChild(el('div', {class:'card'}, [
      el('h3', {}, ['Series chain (previous & next in this scenario)']),
      el('p', {style:'margin:4px 0;color:#475569'}, ['These links power the cross-meeting recap and the CVP-level rollup.']),
      el('div', {style:'display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px'}, [
        el('div', {}, [
          el('div', {style:'font-weight:600;margin-bottom:6px;color:#334155'}, ['Builds on ('+bo.length+')']),
          bo.length ? renderMeetingList(bo.map(x => meetingsById[x]).filter(Boolean)) : el('div', {class:'empty', style:'padding:8px'}, ['— starts a chain —'])
        ]),
        el('div', {}, [
          el('div', {style:'font-weight:600;margin-bottom:6px;color:#334155'}, ['Feeds into ('+fi.length+')']),
          fi.length ? renderMeetingList(fi.map(x => meetingsById[x]).filter(Boolean)) : el('div', {class:'empty', style:'padding:8px'}, ['— end of chain —'])
        ]),
      ])
    ]));
  }
}

// ---------- Interaction patterns ----------
function renderInteractions(main){
  main.appendChild(el('h2', {class:'page-title'}, ['Interaction Patterns']));
  main.appendChild(el('p', {class:'page-sub'}, ['Five distinct meeting setups, increasing in richness from Standard to Cross-Regional + Recap Brief.']));

  // Feature matrix
  const features = [

// ---------- Helpers that synthesize artifact-specific samples from the meeting data we already have ----------
function _personaName(pid){ const p = personasById[pid]; return p ? p.name : pid; }

function generatedDocForMeeting(m){
  const series = m.series || '';
  if (series === 'CVP-REV') return {ext:'pptx', icon:'📊', kind:'PowerPoint deck',
                                    name: m.id+'_CVPReview_'+m.date_iso+'.pptx',
                                    desc:'Executive deck: regional rollups, marquee deal status, exec asks, next actions.'};
  if (series === 'XR-SYNC') return {ext:'docx', icon:'📄', kind:'Word doc',
                                    name: m.id+'_CrossRegionalSummary_'+m.date_iso+'.docx',
                                    desc:'Cross-regional summary: decisions, action items by owner, exec asks for Mat.'};
  if (series.endsWith('-WI')) return {ext:'xlsx', icon:'📈', kind:'Excel workbook',
                                      name: m.id+'_IssueTriage_'+m.date_iso+'.xlsx',
                                      desc:'Triaged issue list: blocker, owner, ETA, escalation path.'};
  if (series === 'AD-HOC') return {ext:'docx', icon:'📝', kind:'Word doc',
                                   name: m.id+'_AdHocActions_'+m.date_iso+'.docx',
                                   desc:'Ad-hoc meeting notes: decisions and follow-ups captured by Facilitator.'};
  return {ext:'docx', icon:'📝', kind:'Word doc',
          name: m.id+'_ActionDoc_'+m.date_iso+'.docx',
          desc:'Action doc with decisions and tasks captured by Facilitator.'};
}

function synthesizeLiveNotes(m){
  // Build structured live notes from agenda + speakers
  const notes = [];
  (m.agenda_topics||m.agenda||[]).forEach((topic, idx) => {
    const sp = (m.speakers||[])[idx];
    notes.push({
      topic: topic,
      who:   sp ? _personaName(sp.persona_id||sp[0]) : '',
      note:  sp ? (sp.what_said||sp[1]) : ''
    });
  });
  return notes;
}

function synthesizeRecap(m){
  const decisions = (m.speakers||[]).slice(0,3).map(s => ({
    who:_personaName(s.persona_id||s[0]),
    text: s.what_said||s[1]
  }));
  const actions = (m.chat_highlights||m.chat||[]).slice(0,3);
  return {
    summary: m.purpose || (m.title+' — '+(decisions.length?decisions.length+' key decisions captured.':'')),
    decisions: decisions,
    actions: actions,
    duration: (m.duration_min||30) + ' min'
  };
}

function synthesizeTranslations(m){
  const langs = (m.languages||[]).filter(l => l !== 'English');
  if (langs.length === 0) return null;
  const pairs = [];
  (m.speakers||[]).forEach(s => {
    const pid = s.persona_id||s[0];
    const text = s.what_said||s[1];
    const p = personasById[pid];
    if (!p) return;
    pairs.push({who:p.name, region:p.region, text:text, langs:langs});
  });
  return {languages:m.languages, pairs:pairs};
}

function heatClass(v, max){
  if (!v) return 'heat-0';
  const r = v / max;
  if (r >= 0.85) return 'heat-5';
  if (r >= 0.65) return 'heat-4';
  if (r >= 0.45) return 'heat-3';
  if (r >= 0.25) return 'heat-2';
  return 'heat-1';
}

function renderMatrixPersonaSeries(){
  const wrap = el('div', {class:'card', style:'overflow-x:auto'});
  wrap.appendChild(el('h3', {}, ['Meeting attendance per person, by series']));
  wrap.appendChild(el('p', {style:'color:#64748b;font-size:12px;margin:4px 0 10px'}, ['Darker = more meetings of that series attended in the 5-week window.']));
  const t = el('table', {class:'matrix'});
  const tr0 = el('tr', {}, [el('th', {style:'text-align:left;min-width:180px'}, ['Person ↓ / Series →'])]);
  DATA.series.forEach(s => tr0.appendChild(el('th', {title:s.name, style:'background:'+s.color+'22;color:'+s.color}, [s.id])));
  tr0.appendChild(el('th', {}, ['Total']));
  const thead = el('thead', {}, [tr0]);
  const tb = el('tbody');
  // compute matrix
  const matrix = {};
  let maxv = 0;
  DATA.personas.forEach(p => {
    matrix[p.id] = {};
    DATA.series.forEach(s => matrix[p.id][s.id] = 0);
    (meetingsByPersona[p.id]||[]).forEach(mid => {
      const m = meetingsById[mid]; if (m) matrix[p.id][m.series]++;
    });
    DATA.series.forEach(s => { if (matrix[p.id][s.id] > maxv) maxv = matrix[p.id][s.id]; });
  });
  DATA.personas.forEach(p => {
    const tr = el('tr', {}, [el('td', {class:'label'}, [el('a',{href:'#/personas/'+p.id, style:'text-decoration:none;color:inherit'}, [p.name])])]);
    let total = 0;
    DATA.series.forEach(s => {
      const v = matrix[p.id][s.id]; total += v;
      const td = el('td', {class: heatClass(v, maxv)}, [v||'']);
      tr.appendChild(td);
    });
    tr.appendChild(el('td', {style:'font-weight:600'}, [String(total)]));
    tb.appendChild(tr);
  });
  t.append(thead, tb);
  wrap.appendChild(t);
  return wrap;
}

function renderMatrixPersonaWeek(){
  const wrap = el('div', {class:'card', style:'overflow-x:auto'});
  wrap.appendChild(el('h3', {}, ['Meeting load per person, by week']));
  wrap.appendChild(el('p', {style:'color:#64748b;font-size:12px;margin:4px 0 10px'}, ['Use this to spot weeks where senior personas (CVP, Director, Regional Heads) carry the heaviest meeting load.']));
  const t = el('table', {class:'matrix'});
  const tr0 = el('tr', {}, [el('th', {style:'text-align:left'}, ['Person ↓ / Week →'])]);
  for (let w=0; w<5; w++) tr0.appendChild(el('th', {}, ['Week '+(w+1)]));
  tr0.appendChild(el('th', {}, ['Total']));
  const thead = el('thead', {}, [tr0]);
  const tb = el('tbody');
  let maxv = 0;
  const matrix = {};
  DATA.personas.forEach(p => {
    matrix[p.id] = [0,0,0,0,0];
    (meetingsByPersona[p.id]||[]).forEach(mid => {
      const m = meetingsById[mid]; if (m && m.week_idx >= 0 && m.week_idx < 5) matrix[p.id][m.week_idx]++;
    });
    matrix[p.id].forEach(v => { if (v > maxv) maxv = v; });
  });
  DATA.personas.forEach(p => {
    const tr = el('tr', {}, [el('td', {class:'label'}, [el('a',{href:'#/personas/'+p.id, style:'text-decoration:none;color:inherit'}, [p.name])])]);
    let total = 0;
    matrix[p.id].forEach(v => { total += v; tr.appendChild(el('td', {class:heatClass(v,maxv)}, [v||''])); });
    tr.appendChild(el('td', {style:'font-weight:600'}, [String(total)]));
    tb.appendChild(tr);
  });
  t.append(thead, tb);
  wrap.appendChild(t);
  return wrap;

function renderRegionActivity(){
  const wrap = el('div', {class:'card', style:'overflow-x:auto'});
  wrap.appendChild(el('h3', {}, ['Region × Week activity (meeting count)']));
  wrap.appendChild(el('p', {style:'color:#64748b;font-size:12px;margin:4px 0 10px'}, ['How busy each region is per week. Cross-Regional and Global rows light up only in the right weeks.']));
  const regions = ['APAC','EMEA','AMER','Cross-Regional','Global'];
  // Map each meeting to a "region bucket" via its series.region
  const matrix = {}; regions.forEach(r => matrix[r] = [0,0,0,0,0]);
  let maxv = 0;
  DATA.meetings.forEach(m => {
    const s = seriesById[m.series];
    if (!s) return;
    let bucket = s.region;
    if (bucket === 'varies') {
      // AD-HOC: derive from organizer region if possible
      const org = personasById[m.organizer];
      if (org) {
        if (org.region.startsWith('APAC')) bucket='APAC';
        else if (org.region.startsWith('EMEA')) bucket='EMEA';
        else if (org.region.startsWith('AMER')) bucket='AMER';
        else bucket='Global';
      } else bucket = 'Global';
    }
    if (matrix[bucket] && m.week_idx>=0 && m.week_idx<5) {
      matrix[bucket][m.week_idx]++;
      if (matrix[bucket][m.week_idx] > maxv) maxv = matrix[bucket][m.week_idx];
    }
  });
  const t = el('table', {class:'matrix'});
  const tr0 = el('tr', {}, [el('th', {style:'text-align:left'}, ['Region ↓ / Week →'])]);
  for (let w=0; w<5; w++) tr0.appendChild(el('th', {}, ['Week '+(w+1)]));
  tr0.appendChild(el('th', {}, ['Total']));
  t.appendChild(el('thead',{},[tr0]));
  const tb = el('tbody');
  regions.forEach(r => {
    const tr = el('tr', {}, [el('td', {class:'label'}, [r])]);
    let total = 0;
    matrix[r].forEach(v => { total += v; tr.appendChild(el('td', {class:heatClass(v,maxv)}, [v||''])); });
    tr.appendChild(el('td', {style:'font-weight:600'}, [String(total)]));
    tb.appendChild(tr);
  });
  t.appendChild(tb);
  wrap.appendChild(t);
  return wrap;
}

function _configTabs(active){
  const tabs = [
    ['users',          'Users',          'users'],
    ['events',         'Events',         'events'],
    ['chats',          'Chats',          'chats'],
    ['onlinemeetings', 'Online Meetings','onlinemeetings'],
    ['testcases',      'Meetings (test cases)', 'testcases'],
  ];
  const bar = el('div', {style:'display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px;border-bottom:1px solid var(--line);padding-bottom:0'});
  tabs.forEach(([key,label]) => {
    const isActive = (key === active);
    const a = el('a', {
      href: '#/config/' + key,
      style: 'padding:8px 14px;font-size:13px;text-decoration:none;border-radius:6px 6px 0 0;border:1px solid '
           + (isActive ? 'var(--line) var(--line) #fff' : 'transparent')
           + ';border-bottom:none;background:' + (isActive ? '#fff' : 'transparent')
           + ';color:' + (isActive ? '#4f46e5' : '#64748b')
           + ';font-weight:' + (isActive ? '600' : '500')
           + ';margin-bottom:-1px',
    }, [label]);
    bar.appendChild(a);
  });
  return bar;
}

function _renderJsonBlock(jsonText){
  let pretty = jsonText;
  try { pretty = JSON.stringify(JSON.parse(jsonText), null, 2); } catch(e) {}
  const pre = el('pre', {
    style: 'background:#0f172a;color:#e2e8f0;padding:14px 16px;border-radius:8px;'
         + 'overflow:auto;max-height:560px;font-size:12px;line-height:1.45;'
         + 'font-family:Consolas,Menlo,monospace;margin:0',
  }, [pretty]);
  return pre;
}

  intro.appendChild(el('div', {style:'color:#64748b;font-size:13px;margin-bottom:12px'}, [
    mids.length + ' meetings organized in 4 series. Each series builds context across 3 meetings, culminating in an ',
    el('strong', {}, ['⭐ E2E meeting']),
    ' that synthesizes all prior context into a final proposal with AI-generated outputs.',
  ]));
  // Legend
  const legend = el('div', {style:'display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px'});
  Object.entries(SERIES_META).forEach(function([key, meta]){
    legend.appendChild(el('div', {style:'display:flex;align-items:center;gap:6px;font-size:12px'}, [
      el('div', {style:'width:14px;height:14px;border-radius:3px;background:'+meta.color}),
      el('span', {}, [meta.label]),
    ]));
  });
  legend.appendChild(el('div', {style:'display:flex;align-items:center;gap:6px;font-size:12px'}, [
    el('div', {style:'width:14px;height:14px;border-radius:3px;background:#fbbf24;border:1px solid #d97706'}),
    el('span', {}, ['⭐ E2E Meeting (cross-meeting synthesis)']),
  ]));
  legend.appendChild(el('div', {style:'display:flex;align-items:center;gap:6px;font-size:12px'}, [
    el('span', {style:'font-size:14px'}, ['🌐']),
    el('span', {}, ['AI Interpreter enabled']),
  ]));
  intro.appendChild(legend);
  main.appendChild(intro);

  if (mids.length === 0){
    main.appendChild(el('div', {class:'card', style:'color:#dc2626'}, ['No test case JSONs embedded.']));
    return;
  }

  // Group by series
  const grouped = {};
  mids.forEach(function(mid){
    const series = mid.charAt(0).toUpperCase();
    if (!grouped[series]) grouped[series] = [];
    grouped[series].push(mid);
  });

  Object.entries(grouped).forEach(function([series, ids]){
    const meta = SERIES_META[series] || {color:'#64748b', bg:'#f8fafc', border:'#e2e8f0', label:'Series '+series, participants:''};
    // Series container
    const container = el('div', {style:'border:2px solid '+meta.border+';border-radius:12px;background:'+meta.bg+';padding:16px;margin-bottom:20px'});
    // Series header
    const header = el('div', {style:'display:flex;align-items:center;gap:10px;margin-bottom:12px'});
    header.appendChild(el('div', {style:'width:6px;height:32px;border-radius:3px;background:'+meta.color}));
    header.appendChild(el('div', {}, [
      el('h3', {style:'margin:0;color:'+meta.color}, [meta.label]),
      el('div', {style:'font-size:12px;color:#64748b;margin-top:2px'}, ['Participants: ' + meta.participants]),
    ]));
    container.appendChild(header);

    // Meeting cards within series
    ids.forEach(function(mid){
      const isE2E = E2E_MEETINGS.indexOf(mid) >= 0;
      const interpreterLang = AI_INTERPRETER_MEETINGS[mid];
      const m = meetingsById[mid.toLowerCase()] || meetingsById[mid];
      const title = m ? (mid + ' — ' + m.title) : mid;
      const json = TESTCASE_FILES[mid];
      const cardStyle = isE2E
        ? 'background:#fff;border:2px solid #fbbf24;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(251,191,36,0.2)'
        : 'background:#fff;border:1px solid '+meta.border+';border-radius:8px;padding:12px;margin-bottom:10px';
      const card = el('div', {style:cardStyle});

      // Card header with badges
      const titleRow = el('div', {style:'display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px'});
      const titleLeft = el('div', {style:'display:flex;align-items:center;gap:8px;flex-wrap:wrap'});
      titleLeft.appendChild(el('h4', {style:'margin:0;font-size:14px'}, [title]));
      if (isE2E) {
        titleLeft.appendChild(el('span', {style:'background:#fbbf24;color:#78350f;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px'}, ['⭐ E2E']));
      }
      if (interpreterLang) {
        titleLeft.appendChild(el('span', {style:'background:#dbeafe;color:#1e40af;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px'}, ['🌐 ' + interpreterLang]));
      }
      titleRow.appendChild(titleLeft);
      titleRow.appendChild(el('div', {style:'display:flex;gap:8px'}, [
        el('button', {class:'tc-btn',         onclick:(function(x){return function(){viewTestcase(x);};})(mid)},     ['📄 View']),
        el('button', {class:'tc-btn primary', onclick:(function(x){return function(){downloadTestcase(x);};})(mid)}, ['⬇ Download']),
      ]));
      card.appendChild(titleRow);
      card.appendChild(_renderJsonBlock(json));
      container.appendChild(card);
    });
    main.appendChild(container);
  });
}

// ---------- boot ----------
route();
</script>
</body>
</html>
